# ============================================================
# LudoArena Backend - Application Configuration
# ============================================================

# Server
server.port=${PORT:8080}

# ============================================================
# MySQL Database Configuration (Railway)
# ============================================================
# ============================================================
# MySQL Database Configuration
# ============================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ludoarena}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
# JWT Configuration
# ============================================================
app.jwt.secret=${JWT_SECRET:LudoArenaSecretKeyForJWTTokenGeneration2024MustBeLongEnough256Bits!!}
app.jwt.expiration-ms=86400000


# OAuth2 Configuration (Google)
# ============================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# Custom property used in AuthService.java
google.client.id=${spring.security.oauth2.client.registration.google.client-id}

# ============================================================
# CORS Configuration
# ============================================================
# Allowed origins (Comma-separated)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,https://ludo-arena-frontend-murex.vercel.app}

# ============================================================
# Thread Pool for Async Tasks
# ============================================================
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100

# ============================================================
# Logging
# ============================================================
logging.level.org.springframework.web=INFO
logging.level.com.ludoarena=DEBUG
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
