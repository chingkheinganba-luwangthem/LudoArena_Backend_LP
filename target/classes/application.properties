# ============================================================
# LudoArena Backend - Application Configuration
# ============================================================

# Server
server.port=${PORT:8080}

# ============================================================
# MySQL Database Configuration (Railway)
# ============================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# JWT Configuration
# ============================================================


# ============================================================
# OAuth2 Configuration (Google & Facebook)
# ============================================================


# Custom property used in AuthService.java (aliased to the standard one)
# google.client.id=${spring.security.oauth2.client.registration.google.client-id}

# ============================================================
# CORS Configuration
# ============================================================
app.cors.allowed-origins=http://localhost:3000

# ============================================================
# Thread Pool for Async Tasks
# ============================================================
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100

# ============================================================
# Logging
# ============================================================
logging.level.org.springframework.web=DEBUG
logging.level.com.ludoarena=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE